<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>זוזו והדרכים 🎁</title>
<style>
  :root{--safe-t:env(safe-area-inset-top);--safe-b:env(safe-area-inset-bottom);--safe-l:env(safe-area-inset-left);--safe-r:env(safe-area-inset-right)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#1a1430;font-family:'Segoe UI',Arial,sans-serif;
    color:#fff;user-select:none;-webkit-user-select:none;touch-action:none;overscroll-behavior:none}
  canvas{position:fixed;inset:0;display:block}

  .hud{position:fixed;top:0;left:0;right:0;z-index:5;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:10px 14px;padding-top:max(12px,var(--safe-t))}
  .glass{background:rgba(255,255,255,.12);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:7px 12px;font-weight:700;font-size:.9rem}
  .hud-l{display:flex;flex-direction:column;gap:7px;align-items:flex-start}
  .hud-r{display:flex;flex-direction:column;gap:7px;align-items:flex-end;text-align:left}
  .pw{color:#ffd447}.coin{color:#ffcf33}.stars{color:#ffd447}.dist{color:#bfe3ff;font-size:.8rem}
  .zone-hint{position:fixed;top:max(58px,calc(var(--safe-t) + 46px));left:50%;transform:translateX(-50%);
    z-index:6;pointer-events:none;background:rgba(20,16,40,.6);border:1px solid rgba(255,255,255,.2);
    border-radius:20px;padding:5px 16px;font-size:.85rem;font-weight:700;white-space:nowrap}
  .mbar-wrap{position:fixed;left:14px;right:14px;bottom:calc(122px + var(--safe-b));z-index:5;pointer-events:none}
  .mbar-lbl{font-size:.66rem;color:#cbd5e1;margin-bottom:3px;text-align:right;font-weight:700}
  .mbar{height:9px;background:rgba(255,255,255,.14);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.2)}
  .mfill{height:100%;width:0%;border-radius:6px;background:linear-gradient(90deg,#2ec4b6,#ff6b4a);transition:width .12s linear}

  .spends{position:fixed;top:calc(70px + var(--safe-t));left:14px;z-index:6;display:flex;gap:8px}
  .spend{pointer-events:auto;background:rgba(20,16,40,.7);border:1.5px solid #2ec4b6;color:#fff;
    border-radius:12px;padding:6px 9px;font-size:.74rem;font-weight:700;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:1px;min-width:50px}
  .spend small{color:#ffd447;font-size:.64rem}
  .spend:disabled{opacity:.4;border-color:#555}.spend:active{transform:scale(.94)}

  .pad{position:fixed;bottom:calc(26px + var(--safe-b));z-index:6;pointer-events:none}
  .pad.move{left:calc(16px + var(--safe-l));display:flex;gap:12px;direction:ltr}
  .pad.jump{right:calc(16px + var(--safe-r))}
  .wbtn{pointer-events:auto;border:none;border-radius:50%;color:#fff;font-weight:800;
    box-shadow:0 7px 22px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center}
  .move .wbtn{width:72px;height:72px;font-size:1.7rem;background:rgba(126,87,194,.82)}
  .jump .wbtn{width:88px;height:88px;font-size:1.2rem;background:rgba(46,196,182,.85)}
  .wbtn:active{transform:scale(.92);filter:brightness(1.3)}
  .mute{position:fixed;top:max(12px,var(--safe-t));left:50%;transform:translateX(-50%);z-index:7;
    pointer-events:auto;background:rgba(20,16,40,.6);border:1px solid rgba(255,255,255,.2);
    color:#fff;border-radius:50%;width:38px;height:38px;font-size:1rem;cursor:pointer}

  .ov{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
    background:rgba(8,8,20,.74);backdrop-filter:blur(4px);padding:18px;overflow:auto;touch-action:pan-y}
  .ov.on{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{background:#15152a;border:2px solid #34344f;border-radius:24px;padding:26px 22px;
    width:420px;max-width:95vw;max-height:92vh;overflow:auto;text-align:center;
    box-shadow:0 24px 70px rgba(0,0,0,.6);animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
  .em{font-size:3.2rem;display:block;margin-bottom:6px}
  h1{font-size:1.6rem;margin-bottom:6px}h1.win{color:#69f0ae}
  .sub{color:#b6b6cc;font-size:.95rem;margin-bottom:18px;line-height:1.7}.sub b{color:#fff}
  .btn{display:block;width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;font-size:1rem;font-weight:800;margin-top:10px}
  .btn:active{transform:scale(.97)}
  .btn-go{background:linear-gradient(90deg,#7e57c2,#9575cd);color:#fff}
  .ch-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:1rem}
  .hearts{letter-spacing:2px}.ch-timer{color:#80d8ff;font-weight:800;font-variant-numeric:tabular-nums}
  .ch-fb{height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:8px}
  .ch-fb .ar{font-size:2.2rem;line-height:1}.ch-fb .t{font-size:1.1rem;font-weight:800;margin-top:2px}
  .ch-disp{font-size:2rem;font-weight:800;letter-spacing:2px;min-height:42px;border:2px solid #34344f;
    border-radius:12px;padding:6px;margin-bottom:10px;background:#0e0e1e}
  .ch-disp.bad{border-color:#ff5252;animation:shk .35s}
  @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .pad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;direction:ltr}
  .pad-grid button{padding:15px 0;border-radius:12px;border:1.5px solid #34344f;background:#1d1d36;
    color:#fff;font-size:1.3rem;font-weight:800;cursor:pointer}
  .pad-grid button:active{transform:scale(.94);background:#2a2a48}
  .pad-grid .ok{background:#2ec4b6;border-color:#2ec4b6;color:#062}
  .pad-grid .del{background:#3a2a3a;border-color:#6a3a5a}
  .ch-hintbtn{margin-top:8px;background:transparent;border:1.5px solid #ffd447;color:#ffd447;
    border-radius:10px;padding:6px 12px;font-weight:700;font-size:.8rem;cursor:pointer}
  .ch-hintbtn:disabled{opacity:.4;border-color:#555;color:#888}
  .ch-hint{margin-top:8px;font-size:.82rem;color:#ffd447;font-weight:700;min-height:18px}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="hud-l">
    <div class="glass"><span class="coin" id="hCoins">🪙 0</span></div>
    <div class="glass"><span id="hSize">⚪ 0/8</span></div>
    <div class="glass"><span class="pw" id="hPow">⚡ 0</span></div>
  </div>
  <div class="hud-r">
    <div class="glass"><span class="stars" id="hStars">⭐ 0/1</span></div>
    <div class="glass dist" id="hDist">0 מ׳</div>
  </div>
</div>
<div class="zone-hint" id="zoneHint"></div>
<button class="mute" id="muteBtn">🔊</button>
<div class="spends" id="spends">
  <button class="spend" id="spRefill">⚡מילוי<small>30</small></button>
</div>
<div class="mbar-wrap"><div class="mbar-lbl">תנופה</div><div class="mbar"><div class="mfill" id="mFill"></div></div></div>

<div class="pad move" id="padMove">
  <button class="wbtn" id="bLeft">◀</button>
  <button class="wbtn" id="bRight">▶</button>
</div>
<div class="pad jump" id="padJump"><button class="wbtn" id="bJump">קפוץ</button></div>

<div class="ov on" id="ovStart">
  <div class="card">
    <span class="em">🟠</span>
    <h1>זוזו והדרכים</h1>
    <p class="sub">אסוף את כל המטבעות 🪙<br>
      קפוץ על האויבים 👾 (או התחמק מהם)<br>
      כשתאסוף הכול — <b>מתנה תופיע</b> 🎁<br>
      נחש את המספר כדי לפתוח אותה ולהמשיך!<br>
      <span id="bestLine" style="color:#ffd447"></span></p>
    <button class="btn btn-go" id="bStart">התחל 🚀</button>
    <p class="sub" style="margin:14px 0 0;font-size:.78rem">מחשב: ← → לזוז, רווח לקפיצה. נייד: הכפתורים למטה.</p>
  </div>
</div>

<div class="ov" id="ovCh">
  <div class="card">
    <span class="em">🎁</span><h1>מתנה!</h1>
    <p class="sub">נחשו מספר בין 1 ל-<b id="chMax">100</b></p>
    <div class="ch-bar"><span class="hearts" id="chHearts"></span><span class="ch-timer" id="chTimer">⏱ 0.0</span></div>
    <div class="ch-fb" id="chFb"><div class="t" style="color:#9aa">הקלידו ניחוש</div></div>
    <div class="ch-disp" id="chDisp"></div>
    <div class="pad-grid" id="padGrid"></div>
    <button class="ch-hintbtn" id="chHintBtn">💡 רמז (25⚡)</button>
    <div class="ch-hint" id="chHint"></div>
  </div>
</div>

<div class="ov" id="ovWin">
  <div class="card">
    <span class="em">🏁</span><h1 class="win">סיימת את השלב!</h1>
    <p class="sub" id="winStats"></p>
    <button class="btn btn-go" id="bAgain">שחק שוב 🔄</button>
  </div>
</div>

<script>
"use strict";
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r!=='number')r=(r&&r.length?r[0]:0);
    this.beginPath();this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);
    this.closePath();return this;};
}
// ════════ LEVELS (data-driven — add zones/levels here) ════════
const LEVELS=[
  { world:1, name:'צעדים ראשונים', range:100, length:5300,
    sky:['#7ec8e3','#bfe9ff'], far:'#4a6fa5', near:'#5c8a72', ground:'#6b4f3a', grass:'#7fb069', accent:'#ffd447',
    zones:[{id:0,x0:0,x1:1700},{id:1,x0:1700,x1:3300},{id:2,x0:3300,x1:5300}],
    platforms:[ {x:1900,h:120,w:170},{x:2150,h:160,w:160},{x:2400,h:160,w:200},{x:2650,h:120,w:170} ],
    coins:[
      // ZONE 0 — ground line (required) + arc over spike (bonus)
      {x:320,h:46,zone:0},{x:440,h:46,zone:0},{x:560,h:46,zone:0},{x:760,h:46,zone:0},
      {x:980,h:60,zone:0},{x:1400,h:60,zone:0},
      {x:1120,h:130,zone:0},{x:1220,h:160,zone:0},{x:1320,h:130,zone:0},
      // ZONE 1 — ground (required) + high road & big coin (bonus)
      {x:1800,h:46,zone:1},{x:3000,h:46,zone:1},{x:3120,h:46,zone:1},
      {x:1950,h:175,zone:1},{x:2200,h:215,zone:1},{x:2700,h:175,zone:1},{x:2520,h:230,zone:1,big:true},
      // ZONE 2 — ground (required) + arc over spike (bonus)
      {x:3500,h:46,zone:2},{x:3650,h:46,zone:2},{x:3800,h:46,zone:2},{x:3950,h:46,zone:2},
      {x:4360,h:60,zone:2},{x:4640,h:60,zone:2},{x:4760,h:46,zone:2},{x:4880,h:46,zone:2},
      {x:4500,h:150,zone:2},
    ],
    enemies:[
      {x0:600,x1:1000,type:'plodder',zone:0},
      {x0:1810,x1:2060,type:'plodder',zone:1},
      {x0:2900,x1:3160,type:'hopper',zone:1},
      {x0:3600,x1:3950,type:'plodder',zone:2},
    ],
    hazards:[ {x:1120,w:40},{x:2950,w:40},{x:4500,w:40} ],
    stars:[ {x:2230,h:205} ],
    presents:[ {x:1560,zone:0,range:100},{x:3180,zone:1,range:100},{x:4960,zone:2,range:100} ],
    checkpoints:[ {x:1680},{x:3320} ],
    goal:{x:5160} },
];

// ════════ STATE ════════
let state='start', level, levelIdx=0, GROUND_Y=0, camX=0;
let momentum=0, runPower=0, lifetime=0, coinsCollected=0;
let shakeMag=0, particles=[], popups=[], lastCheckpointX=20, appearFlash=0;
let starsGot=0, totalStars=1;
let pSize=0, growth=0;
const GROW=8;
let zoneReqTotal={}, zoneReqGot={};
const keys={left:false,right:false,jump:false};
const player={x:20,prevX:20,y:0,prevY:0,vx:0,vy:0,facing:1,grounded:true,onPlat:false,
  curPlat:null,coyote:0,jumpBuf:0,stagger:0,invuln:0,sx:1,sy:1,walkT:0,jumpHeld:false};
let chPresent=null, chRange=100, chMax=5, chSecret=0, chLeft=0, chStart=0, chTimerIv=null, padVal='', chHintUsed=false, chResolved=false;

// ════════ CANVAS ════════
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);GROUND_Y=H-130;
  if(player.grounded&&!player.onPlat)player.y=GROUND_Y;
}
addEventListener('resize',resize);addEventListener('orientationchange',resize);

// ════════ AUDIO ════════
let actx=null, muted=false, voices=0;
function AC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function unlockAudio(){try{const c=AC();if(c.state!=='running')c.resume();
  if(!c._kick){c._kick=1;const o=c.createOscillator(),g=c.createGain();g.gain.value=0.0001;
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.02);}}catch(e){}}
function tone(freq,dur,vol,type,slideTo){
  if(muted||voices>8)return;
  try{const c=AC(),o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,c.currentTime);
    if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,c.currentTime+dur);
    g.gain.setValueAtTime(vol||.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);voices++;o.onended=()=>{voices--;};
  }catch(e){}}
let stepThrottle=0;
function sndStep(){const t=performance.now();if(t-stepThrottle<180)return;stepThrottle=t;tone(180,.04,.09,'square');}
function sndJump(){tone(300,.18,.22,'triangle',620);}
function sndLand(){tone(140,.12,.22,'sine',70);}
function sndOof(){tone(200,.22,.28,'sawtooth',90);}
function sndStar(){tone(880,.12,.2,'triangle',1320);}
function sndCoin(){tone(988,.07,.18,'sine',1480);}
function sndStomp(){tone(820,.07,.22,'square',1180);setTimeout(()=>tone(1180,.09,.18,'square'),60);}
function sndCheck(){tone(523,.1,.2,'sine');setTimeout(()=>tone(784,.14,.2,'sine'),90);}
function sndOpen(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.1,.2,'triangle'),i*70));}
function sndAppear(){[660,880,1175].forEach((f,i)=>setTimeout(()=>tone(f,.12,.2,'triangle'),i*90));}
function sndGrow(){[523,659,784,988,1175].forEach((f,i)=>setTimeout(()=>tone(f,.09,.2,'square'),i*55));}
function sndShrink(){[700,500,350].forEach((f,i)=>setTimeout(()=>tone(f,.1,.2,'sawtooth'),i*70));}
function sndWin(){[392,523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.16,.22,'triangle'),i*120));}
function sndPing(prox){tone(400+prox*900,.1,.16,'sine');}
function haptic(p){try{navigator.vibrate&&navigator.vibrate(p)}catch(e){}}

// ════════ SAVE ════════
const SAVE_KEY='a2_save_v2';
function defSave(){return{schema:2,lifetimePower:0,perWorld:{1:{bestPower:0,bestCoins:0,completed:false}},settings:{muted:false}};}
function loadSave(){try{const v=localStorage.getItem(SAVE_KEY);if(!v)return defSave();return Object.assign(defSave(),JSON.parse(v));}catch(e){return defSave();}}
function writeSave(s){try{localStorage.setItem(SAVE_KEY,JSON.stringify(s));}catch(e){}}
let save=loadSave();muted=!!(save.settings&&save.settings.muted);

// ════════ INPUT ════════
function bindHold(id,key){
  const el=document.getElementById(id);const ptrs=new Set();
  const on=e=>{e.preventDefault();if(state!=='play')return;
    ptrs.add(e.pointerId);try{el.setPointerCapture(e.pointerId);}catch(_){}
    keys[key]=true;if(key==='jump')player.jumpBuf=0.13;unlockAudio();haptic(8);};
  const off=e=>{e.preventDefault();ptrs.delete(e.pointerId);if(ptrs.size===0)keys[key]=false;};
  el.addEventListener('pointerdown',on);el.addEventListener('pointerup',off);el.addEventListener('pointercancel',off);
}
bindHold('bLeft','left');bindHold('bRight','right');bindHold('bJump','jump');
addEventListener('keydown',e=>{unlockAudio();
  if(state==='challenge'){
    if(e.key==='Enter'){e.preventDefault();submitGuess();}
    else if(e.key==='Backspace'){e.preventDefault();padPress('del');}
    else if(/^[0-9]$/.test(e.key)){e.preventDefault();padPress(e.key);}
    return;}
  if(state!=='play')return;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
  if((e.key===' '||e.key==='ArrowUp'||e.key==='w')&&!e.repeat){keys.jump=true;player.jumpBuf=0.13;}
});
addEventListener('keyup',e=>{
  if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w')keys.jump=false;
});
document.getElementById('muteBtn').addEventListener('click',()=>{
  muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';save.settings.muted=muted;writeSave(save);});
document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
document.getElementById('spRefill').addEventListener('click',()=>{
  if(state!=='play')return;if(runPower>=30){runPower-=30;momentum=100;sndStar();updateHUD();}});
document.getElementById('bStart').addEventListener('click',startLevel);
document.getElementById('bAgain').addEventListener('click',startLevel);
(function(){const g=document.getElementById('padGrid');
  ['1','2','3','4','5','6','7','8','9','del','0','ok'].forEach(k=>{const b=document.createElement('button');
    if(k==='ok'){b.className='ok';b.textContent='אישור';}else if(k==='del'){b.className='del';b.textContent='⌫';}else b.textContent=k;
    b.addEventListener('click',()=>padPress(k));g.appendChild(b);});})();
document.getElementById('chHintBtn').addEventListener('click',useHint);

// ════════ FLOW ════════
function show(id){document.querySelectorAll('.ov').forEach(o=>o.classList.remove('on'));if(id)document.getElementById(id).classList.add('on');}
function startLevel(){
  unlockAudio();level=LEVELS[levelIdx];GROUND_Y=H-130;
  level.coins.forEach(c=>c.got=false);
  level.enemies.forEach(e=>{e.alive=true;e.squashT=0;e.x=e.x0;e.dir=1;e.hopY=0;e.vy=0;e.onGround=true;e.hopTimer=Math.random()*0.8+0.5;});
  level.presents.forEach(p=>{p.opened=false;p.spawned=false;});
  level.stars.forEach(s=>s.got=false);
  level.checkpoints.forEach(c=>c.done=false);
  zoneReqTotal={};zoneReqGot={};
  level.zones.forEach(z=>{zoneReqTotal[z.id]=0;zoneReqGot[z.id]=0;});
  level.coins.forEach(c=>{if(c.h<=70)zoneReqTotal[c.zone]++;});
  totalStars=level.stars.length;
  momentum=40;runPower=0;coinsCollected=0;lastCheckpointX=20;particles=[];popups=[];shakeMag=0;appearFlash=0;
  pSize=0;growth=0;
  Object.assign(player,{x:20,prevX:20,y:GROUND_Y,prevY:GROUND_Y,vx:0,vy:0,facing:1,grounded:true,onPlat:false,
    curPlat:null,coyote:0,jumpBuf:0,stagger:0,invuln:0,sx:1,sy:1,walkT:0});
  show(null);state='play';updateHUD();
}
function levelComplete(){
  if(state!=='play')return;state='win';
  const pw=save.perWorld[1];if(runPower>pw.bestPower)pw.bestPower=runPower;if(coinsCollected>pw.bestCoins)pw.bestCoins=coinsCollected;
  pw.completed=true;save.lifetimePower=(save.lifetimePower||0)+runPower;writeSave(save);
  document.getElementById('winStats').innerHTML=
    `אספת <b>🪙 ${coinsCollected}</b> מטבעות<br>צברת <b>⚡ ${runPower}</b> כוח<br>כוכבים: <b>⭐ ${starsGot}/${totalStars}</b>`;
  burstAt(player.x,player.y-40,'#ffd447');sndWin();haptic([60,40,120]);show('ovWin');
}
function failSegment(){
  player.x=lastCheckpointX;player.y=GROUND_Y;player.prevX=lastCheckpointX;player.prevY=GROUND_Y;
  player.vx=0;player.vy=0;player.grounded=true;player.onPlat=false;player.curPlat=null;
  momentum=35;player.invuln=1.0;shakeMag=10;camX=Math.max(0,player.x-W*0.30);
  level.enemies.forEach(e=>{if(e.x0>lastCheckpointX){e.alive=true;e.squashT=0;e.x=e.x0;e.dir=1;e.hopY=0;e.onGround=true;}});
}
function hitHazard(){
  if(player.invuln>0)return;player.jumpBuf=0;
  if(pSize>0){ // BIG -> shrink to small, survive (Mario rule)
    pSize=0;growth=0;player.invuln=1.4;player.vx=-220*player.facing;player.vy=-220;
    shakeMag=10;sndShrink();haptic([40,30,40]);
    popups.push({x:player.x,y:player.y-70,txt:'💢',life:1,col:'#ff8a80'});updateHUD();
  }else{ // SMALL -> die, restart from checkpoint
    shakeMag=14;sndOof();haptic([200,100,200]);failSegment();
  }
}
function growBig(){
  if(pSize>0)return;pSize=1;growth=0;player.invuln=0.5;
  sndGrow();burstAt(player.x,player.y-50,'#7CFFB2');shakeMag=6;
  popups.push({x:player.x,y:player.y-86,txt:'גדלת! 🔵',life:1.4,col:'#7CFFB2'});updateHUD();
}

// ════════ COINS / ZONES ════════
function collectCoin(c){
  c.got=true;coinsCollected++;runPower+=c.big?5:1;
  sndCoin();burstAt(c.x,GROUND_Y-c.h,'#ffcf33');
  popups.push({x:c.x,y:GROUND_Y-c.h,txt:'+'+(c.big?5:1),life:1,col:'#ffcf33'});
  if(c.h<=70){zoneReqGot[c.zone]++;checkZoneSpawn(c.zone);}
  if(pSize===0){growth++;if(growth>=GROW)growBig();}
  updateHUD();
}
function checkZoneSpawn(z){
  if(zoneReqGot[z]<zoneReqTotal[z])return;
  const pr=level.presents.find(p=>p.zone===z&&!p.spawned&&!p.opened);
  if(pr){pr.spawned=true;burstAt(pr.x,GROUND_Y-40,level.accent);sndAppear();appearFlash=1.8;updateHUD();}
}

// ════════ CHALLENGE ════════
function attemptsFor(range){const base=Math.ceil(Math.log2(range));
  const buf=range<=100?-2:range<=1000?-2:range<=10000?-2:range<=50000?1:3;return Math.max(3,base+buf);}
function openChallenge(pr){
  state='challenge';chPresent=pr;keys.left=keys.right=keys.jump=false;player.jumpBuf=0;chResolved=false;
  chRange=pr.range||level.range;chMax=attemptsFor(chRange);chLeft=chMax;
  chSecret=Math.floor(Math.random()*chRange)+1;chStart=performance.now();padVal='';chHintUsed=false;
  document.getElementById('chMax').textContent=chRange;
  document.getElementById('chDisp').textContent='';
  document.getElementById('chFb').innerHTML='<div class="t" style="color:#9aa">הקלידו ניחוש</div>';
  document.getElementById('chHint').textContent='';
  document.getElementById('chHintBtn').disabled=runPower<25;
  renderHearts();
  if(chTimerIv)clearInterval(chTimerIv);
  chTimerIv=setInterval(()=>{document.getElementById('chTimer').textContent='⏱ '+((performance.now()-chStart)/1000).toFixed(1);},100);
  show('ovCh');
}
function renderHearts(){let h='';for(let i=0;i<chMax;i++)h+=i<chLeft?'❤️':'🖤';document.getElementById('chHearts').textContent=h;}
function padPress(k){
  if(state!=='challenge'||chResolved)return;
  if(k==='ok'){submitGuess();return;}
  if(k==='del'){padVal=padVal.slice(0,-1);}
  else{const next=(padVal+k).replace(/^0+(?=\d)/,'');if(parseInt(next,10)<=chRange)padVal=next;}
  document.getElementById('chDisp').textContent=padVal;
}
function useHint(){
  if(chHintUsed||runPower<25)return;chHintUsed=true;runPower-=25;updateHUD();
  document.getElementById('chHintBtn').disabled=true;const mid=Math.ceil(chRange/2);
  document.getElementById('chHint').textContent=chSecret<=mid?`💡 המספר בין 1 ל-${mid}`:`💡 המספר בין ${mid+1} ל-${chRange}`;
}
function submitGuess(){
  if(state!=='challenge'||chResolved)return;
  const val=parseInt(padVal,10);const disp=document.getElementById('chDisp');
  if(!Number.isFinite(val)||val<1||val>chRange){disp.classList.add('bad');setTimeout(()=>disp.classList.remove('bad'),350);haptic(50);return;}
  chLeft--;renderHearts();
  const delta=chSecret-val, dist=Math.abs(delta), prox=1-dist/chRange;sndPing(prox);
  const fb=document.getElementById('chFb');
  if(delta===0){
    chResolved=true;padVal='';if(chTimerIv)clearInterval(chTimerIv);
    const elapsed=(performance.now()-chStart)/1000;
    const speedF=Math.max(.5,Math.min(2,2-elapsed/10)), eff=1+chLeft/chMax;
    const gain=Math.round(15*speedF*eff);
    runPower+=gain;lifetime+=gain;chPresent.opened=true;
    if(pSize===0)growBig();
    save.lifetimePower=(save.lifetimePower||0)+gain;writeSave(save);
    fb.innerHTML=`<div class="ar">🎉</div><div class="t" style="color:#69f0ae">+${gain} ⚡!</div>`;
    sndOpen();haptic([60,40]);burstAt(chPresent.x,GROUND_Y-40,level.accent);
    setTimeout(()=>{show(null);state='play';updateHUD();},900);return;
  }
  let col,word;
  if(dist<=Math.max(1,Math.round(chRange*0.01))){col='#fff';word='🔥 רותח!';}
  else if(dist<=Math.max(2,Math.round(chRange*0.03))){col='#ff5252';word='חם!';}
  else if(dist<=chRange*0.1){col='#ff9800';word='פושר';}
  else if(dist<=chRange*0.3){col='#2ec4b6';word='קריר';}
  else{col='#60a5fa';word='קר';}
  fb.innerHTML=`<div class="ar">${delta>0?'⬆️':'⬇️'}</div>
    <div class="t" style="color:${col}">${delta>0?'המספר גדול יותר':'המספר קטן יותר'} · ${word}</div>`;
  padVal='';document.getElementById('chDisp').textContent='';
  if(chLeft<=0){
    chResolved=true;if(chTimerIv)clearInterval(chTimerIv);
    fb.innerHTML=`<div class="t" style="color:#ff8a80">המספר היה ${chSecret} — נסו שוב!</div>`;
    sndOof();haptic([120,60,120]);
    setTimeout(()=>{show(null);state='play';failSegment();updateHUD();},1300);
  }
}

// ════════ UPDATE ════════
function update(dt){
  const p=player;
  if(p.coyote>0)p.coyote-=dt;if(p.jumpBuf>0)p.jumpBuf-=dt;if(p.stagger>0)p.stagger-=dt;if(p.invuln>0)p.invuln-=dt;
  if(appearFlash>0)appearFlash-=dt;
  p.jumpHeld=keys.jump;const staggered=p.stagger>0;let jumpedThisFrame=false;

  let dir=0;if(!staggered){if(keys.right)dir+=1;if(keys.left)dir-=1;}
  const baseMax=320, maxV=baseMax*(1+0.45*(momentum/100));
  if(dir!==0){const accel=(p.vx!==0&&Math.sign(dir)!==Math.sign(p.vx))?2880:1800;p.vx+=dir*accel*dt;p.facing=dir>0?1:-1;}
  else{const fr=p.grounded?2400:700;if(p.vx>0)p.vx=Math.max(0,p.vx-fr*dt);else if(p.vx<0)p.vx=Math.min(0,p.vx+fr*dt);}
  p.vx=Math.max(-maxV,Math.min(maxV,p.vx));

  const canJump=p.grounded||p.coyote>0;
  if(p.jumpBuf>0&&canJump&&!staggered){
    p.vy=-680*(1+0.30*(momentum/100));p.grounded=false;p.onPlat=false;p.curPlat=null;p.coyote=0;p.jumpBuf=0;
    p.sx=0.8;p.sy=1.2;sndJump();jumpedThisFrame=true;}
  if(p.vy<0&&!p.jumpHeld&&p.vy<-460)p.vy=-460;
  let g=(p.vy<0&&p.jumpHeld)?1900:2600;if(Math.abs(p.vy)<120)g*=0.55;p.vy+=g*dt;

  p.prevX=p.x;p.prevY=p.y;p.x+=p.vx*dt;p.y+=p.vy*dt;
  if(p.x<20){p.x=20;if(p.vx<0)p.vx=0;}
  if(p.x>level.length-20){p.x=level.length-20;if(p.vx>0)p.vx=0;}
  if(p.grounded&&Math.abs(p.vx)>20){p.walkT+=dt*(8+Math.abs(p.vx)/26);sndStep();}

  const was=p.grounded;p.grounded=false;
  if(p.vy>=0){for(const pl of level.platforms){const top=GROUND_Y-pl.h;
    if(p.x>pl.x-8&&p.x<pl.x+pl.w+8&&p.prevY<=top&&p.y>=top){p.y=top;p.vy=0;p.grounded=true;p.onPlat=true;p.curPlat=pl;break;}}}
  if(!p.grounded&&p.y>=GROUND_Y){p.y=GROUND_Y;p.vy=0;p.grounded=true;p.onPlat=false;p.curPlat=null;}
  if(p.grounded&&p.onPlat&&p.curPlat){const pl=p.curPlat;if(p.x<pl.x-8||p.x>pl.x+pl.w+8){p.grounded=false;p.onPlat=false;p.curPlat=null;}}
  if(p.grounded&&!was){p.sx=1.25;p.sy=0.75;sndLand();}
  if(!p.grounded&&was&&!jumpedThisFrame)p.coyote=0.1;
  p.sx+=(1-p.sx)*Math.min(1,dt*8);p.sy+=(1-p.sy)*Math.min(1,dt*8);

  if(p.grounded&&Math.abs(p.vx)>0.6*maxV)momentum=Math.min(100,momentum+22*dt);else momentum=Math.max(0,momentum-8*dt);

  if(p.invuln<=0&&p.grounded&&!p.onPlat){for(const h of level.hazards){if(p.x>h.x&&p.x<h.x+h.w){hitHazard();break;}}}

  updateEnemies(dt);

  // coins
  const cyc=p.y-34;
  for(const c of level.coins){if(c.got)continue;if(Math.abs(p.x-c.x)<32&&Math.abs(cyc-(GROUND_Y-c.h))<42)collectCoin(c);}

  for(const c of level.checkpoints){if(!c.done&&p.x>=c.x){c.done=true;lastCheckpointX=c.x;sndCheck();}}
  for(const s of level.stars){if(s.got)continue;const sy=GROUND_Y-s.h;
    if(Math.abs(p.x-s.x)<52&&Math.abs(p.y-sy)<60){s.got=true;starsGot++;sndStar();burstAt(s.x,sy,'#ffd447');updateHUD();}}

  checkGates();
  if(p.x>=level.goal.x)levelComplete();

  camX=Math.max(0,p.x-W*0.30);
  if(shakeMag>0.3)shakeMag*=0.9;else shakeMag=0;
  for(let i=particles.length-1;i>=0;i--){const pt=particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.3;pt.life-=dt*60;if(pt.life<=0)particles.splice(i,1);}
  for(let i=popups.length-1;i>=0;i--){const f=popups[i];f.y-=0.7;f.life-=dt;if(f.life<=0)popups.splice(i,1);}
}
function updateEnemies(dt){
  const p=player;
  for(const e of level.enemies){
    if(!e.alive){if(e.squashT>0)e.squashT-=dt;continue;}
    const speed=e.type==='hopper'?52:64;
    e.x+=e.dir*speed*dt;if(e.x<e.x0){e.x=e.x0;e.dir=1;}else if(e.x>e.x1){e.x=e.x1;e.dir=-1;}
    if(e.type==='hopper'){e.hopTimer-=dt;
      if(e.onGround&&e.hopTimer<=0){e.vy=-560;e.onGround=false;e.hopTimer=1.3;}
      if(!e.onGround){e.vy+=2600*dt;e.hopY-=e.vy*dt;if(e.hopY<=0){e.hopY=0;e.onGround=true;e.vy=0;}}}
    const ew=e.type==='hopper'?36:40, eh=e.type==='hopper'?34:40;
    const eTop=GROUND_Y-((e.type==='hopper'?e.hopY:0)+eh);
    const eLeft=e.x-ew/2, eRight=e.x+ew/2;
    const pHalf=pSize?22:17, pHead=p.y-(pSize?86:64);
    // AABB overlap of Zuzu's body with the enemy's body
    const overlap = p.x+pHalf>eLeft && p.x-pHalf<eRight && pHead<GROUND_Y && p.y>eTop;
    if(overlap){
      // precise head-stomp: must be descending AND have come from above the enemy's top
      const stomping = p.vy>0 && p.prevY<=eTop+8;
      if(stomping){
        e.alive=false;e.squashT=0.3;
        p.vy=keys.jump?-640:-500;p.grounded=false;p.onPlat=false;p.curPlat=null;p.coyote=0;p.jumpBuf=0;p.sx=0.7;p.sy=1.3;
        runPower+=5;lifetime+=5;sndStomp();burstAt(e.x,eTop,'#d8b4ff');haptic(15);shakeMag=5;
        popups.push({x:e.x,y:eTop,txt:'+5',life:1,col:'#d8b4ff'});updateHUD();
      }else if(p.invuln<=0){hitHazard();}
    }
  }
}
function checkGates(){
  const p=player;
  for(const pr of level.presents){if(pr.opened)continue;
    if(p.x>=pr.x-24){p.x=pr.x-24;if(p.vx>0)p.vx=0;if(pr.spawned)openChallenge(pr);return;}
  }
}
function burstAt(wx,wy,col){for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*5+2;
  particles.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:Math.random()*3+2,col:Math.random()<.5?col:'#fff',life:42});}}

// ════════ RENDER ════════
function drawHills(color,factor,baseOff,amp){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(0,H);const sc=camX*factor;
  for(let x=0;x<=W;x+=16){const wx=x+sc;ctx.lineTo(x,GROUND_Y+baseOff-Math.sin(wx*0.004)*amp-Math.cos(wx*0.011)*amp*0.4);}
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();}
function emoji(ch,wx,wy,size){const sx=wx-camX;if(sx<-70||sx>W+70)return;
  ctx.font=(size||32)+'px serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(ch,sx,wy);}
function drawCoin(c){const sx=c.x-camX;if(sx<-40||sx>W+40)return;
  const t=performance.now(),r=c.big?17:11,bob=Math.sin(t/300+c.x)*4,sp=Math.abs(Math.cos(t/260+c.x*0.05))*0.8+0.2,cy=GROUND_Y-c.h+bob;
  ctx.save();ctx.translate(sx,cy);ctx.scale(sp,1);
  ctx.fillStyle='#ffcf33';ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.fill();
  ctx.lineWidth=2;ctx.strokeStyle='#d99e1f';ctx.stroke();
  ctx.fillStyle='#ffe680';ctx.beginPath();ctx.arc(0,0,r*0.55,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(-r*0.3,-r*0.3,r*0.18,0,7);ctx.fill();ctx.restore();
  if(c.big){ctx.fillStyle='#a86a00';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText('5',sx,cy+5);}}
function drawPlodder(sx,facing,squashT){
  ctx.save();ctx.translate(sx,GROUND_Y);if(squashT>0){const k=Math.max(0.12,squashT/0.3);ctx.scale(1.3,k);}ctx.scale(facing,1);
  const f=Math.sin(performance.now()/120)*3;
  ctx.fillStyle='#4a2c12';ctx.fillRect(-12+f,-8,11,8);ctx.fillRect(2-f,-8,11,8);
  ctx.fillStyle='#9c5a2c';ctx.beginPath();ctx.moveTo(-18,-6);ctx.lineTo(-18,-22);ctx.arc(0,-22,18,Math.PI,0);ctx.lineTo(18,-6);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-7,-26,5,0,7);ctx.arc(7,-26,5,0,7);ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(-6,-25,2.4,0,7);ctx.arc(8,-25,2.4,0,7);ctx.fill();
  ctx.strokeStyle='#3a1f0c';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-12,-33);ctx.lineTo(-3,-30);ctx.moveTo(12,-33);ctx.lineTo(3,-30);ctx.stroke();ctx.restore();}
function drawHopper(sx,hopY){
  ctx.save();ctx.translate(sx,GROUND_Y-hopY);
  ctx.fillStyle='#d500f9';for(let a=Math.PI;a<=2*Math.PI+0.01;a+=Math.PI/4){
    const ax=Math.cos(a)*15,ay=-18+Math.sin(a)*15,tx=Math.cos(a)*24,ty=-18+Math.sin(a)*24,perp=a+Math.PI/2,wp=4;
    ctx.beginPath();ctx.moveTo(ax+Math.cos(perp)*wp,ay+Math.sin(perp)*wp);ctx.lineTo(tx,ty);ctx.lineTo(ax-Math.cos(perp)*wp,ay-Math.sin(perp)*wp);ctx.closePath();ctx.fill();}
  ctx.fillStyle='#8e24aa';ctx.beginPath();ctx.arc(0,-18,16,0,7);ctx.fill();
  ctx.fillStyle='#ce93d8';ctx.beginPath();ctx.arc(0,-14,8,0,7);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5,-20,4,0,7);ctx.arc(5,-20,4,0,7);ctx.fill();
  ctx.fillStyle='#ff1744';ctx.beginPath();ctx.arc(-5,-20,2,0,7);ctx.arc(5,-20,2,0,7);ctx.fill();
  ctx.fillStyle='#6a1b9a';ctx.fillRect(-9,-3,7,4);ctx.fillRect(3,-3,7,4);ctx.restore();}
function drawEnemy(e){const sx=e.x-camX;if(sx<-70||sx>W+70)return;
  if(!e.alive){if(e.squashT>0){ctx.save();ctx.translate(sx,GROUND_Y);ctx.fillStyle=e.type==='hopper'?'#8e24aa':'#9c5a2c';
    const k=Math.max(0.1,e.squashT/0.3);ctx.beginPath();ctx.ellipse(0,-6,20,14*k,0,0,7);ctx.fill();ctx.restore();}return;}
  if(e.type==='hopper')drawHopper(sx,e.hopY);else drawPlodder(sx,e.dir,0);}
function drawZuzu(){
  const p=player;if(p.invuln>0&&Math.floor(performance.now()/80)%2)return;
  const sx=p.x-camX,fy=p.y;ctx.save();ctx.translate(sx,fy);
  if(momentum>70){ctx.shadowBlur=20;ctx.shadowColor='#ffd447';}
  const gs=pSize?1.35:1;ctx.scale(p.facing*gs,gs);const bob=p.grounded?-Math.abs(Math.sin(p.walkT*2))*4:0;ctx.translate(0,bob);ctx.scale(p.sx,p.sy);
  const sw=Math.sin(p.walkT)*7;ctx.strokeStyle='#E8533A';ctx.lineWidth=6;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-8,-10);ctx.lineTo(-8+sw,2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,-10);ctx.lineTo(8-sw,2);ctx.stroke();
  const asw=Math.sin(p.walkT+Math.PI)*6;
  ctx.beginPath();ctx.moveTo(-20,-44);ctx.lineTo(-24,-30+asw);ctx.stroke();
  ctx.beginPath();ctx.moveTo(20,-44);ctx.lineTo(24,-30-asw);ctx.stroke();
  ctx.fillStyle='#FF6B4A';ctx.beginPath();ctx.ellipse(0,-40,24,30,0,0,7);ctx.fill();
  ctx.fillStyle='#FF4521';ctx.beginPath();ctx.ellipse(0,-30,14,16,0,0,Math.PI);ctx.fill();
  ctx.fillStyle='#2EC4B6';const sf=Math.sin(performance.now()/120)*4;
  ctx.beginPath();ctx.moveTo(-14,-20);ctx.quadraticCurveTo(-26,-14+sf,-30,-2+sf);ctx.lineTo(-20,-6);ctx.quadraticCurveTo(-16,-14,-10,-18);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-8,-46,7,0,7);ctx.arc(9,-46,7,0,7);ctx.fill();
  ctx.fillStyle='#1A1A2E';const lx=p.vx>30?2:p.vx<-30?-2:1;
  ctx.beginPath();ctx.arc(-8+lx,-45,3.2,0,7);ctx.arc(9+lx,-45,3.2,0,7);ctx.fill();ctx.restore();}
function render(){
  ctx.save();if(shakeMag>0)ctx.translate((Math.random()-.5)*shakeMag,(Math.random()-.5)*shakeMag);
  const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,level.sky[0]);sky.addColorStop(1,level.sky[1]);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,245,200,.9)';ctx.beginPath();ctx.arc(W*0.8,H*0.18,40,0,7);ctx.fill();
  drawHills(level.far,0.25,40,80);drawHills(level.near,0.55,70,55);
  for(let i=0;i<6;i++){const wx=i*900+300;emoji(i%2?'🌳':'☁️',wx,GROUND_Y-(i%2?2:200),i%2?42:36);}
  ctx.fillStyle=level.ground;ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle=level.grass;ctx.fillRect(0,GROUND_Y-4,W,8);
  ctx.fillStyle='rgba(0,0,0,.10)';for(let x=-(camX%48);x<W;x+=48)ctx.fillRect(x,GROUND_Y+10,24,H);
  level.platforms.forEach(pl=>{const sxp=pl.x-camX,top=GROUND_Y-pl.h;if(sxp>W+40||sxp+pl.w<-40)return;
    ctx.fillStyle=level.ground;ctx.beginPath();ctx.roundRect(sxp,top,pl.w,22,8);ctx.fill();
    ctx.fillStyle=level.grass;ctx.beginPath();ctx.roundRect(sxp,top,pl.w,6,4);ctx.fill();});
  // hazards (bold spikes)
  level.hazards.forEach(h=>{const sx=h.x-camX;if(sx<-80||sx>W+80)return;const cxm=sx+h.w/2;
    ctx.fillStyle='#e53935';ctx.strokeStyle='#5a0000';ctx.lineWidth=2.5;ctx.lineJoin='round';
    for(let k=-1;k<=1;k++){const bx=cxm+k*15,th=k===0?48:36;
      ctx.beginPath();ctx.moveTo(bx-11,GROUND_Y);ctx.lineTo(bx,GROUND_Y-th);ctx.lineTo(bx+11,GROUND_Y);ctx.closePath();ctx.fill();ctx.stroke();}
    emoji('⚠️',h.x+h.w/2,GROUND_Y-54,24);});
  level.coins.forEach(c=>{if(!c.got)drawCoin(c);});
  level.enemies.forEach(drawEnemy);
  level.checkpoints.forEach(c=>emoji(c.done?'🚩':'🏳️',c.x,GROUND_Y-2,34));
  level.stars.forEach(s=>{if(s.got)return;emoji('⭐',s.x,GROUND_Y-s.h+Math.sin(performance.now()/300+s.x)*5,30);});
  // presents: locked gate vs spawned reward
  const t=performance.now()/1000;
  level.presents.forEach(pr=>{if(pr.opened)return;const sx=pr.x-camX;if(sx<-70||sx>W+70)return;
    if(!pr.spawned){ctx.fillStyle='rgba(150,150,180,.22)';ctx.fillRect(sx-4,GROUND_Y-120,8,120);emoji('🔒',pr.x,GROUND_Y-100,28);return;}
    ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(sx,GROUND_Y+4,30,9,0,0,7);ctx.fill();
    const R=40+Math.sin(t*3)*8;ctx.strokeStyle='rgba(255,212,71,'+(0.45+0.3*Math.sin(t*3))+')';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(sx,GROUND_Y-30,R,0,7);ctx.stroke();
    ctx.shadowColor=level.accent;ctx.shadowBlur=18;emoji('🎁',pr.x,GROUND_Y-6+Math.sin(t*4)*6,56);ctx.shadowBlur=0;
    emoji('⬇️',pr.x,GROUND_Y-86+Math.sin(t*5)*8,28);});
  level.goal&&emoji('🏁',level.goal.x,GROUND_Y-2,46);
  particles.forEach(pt=>{ctx.globalAlpha=Math.max(0,pt.life/42);ctx.fillStyle=pt.col;ctx.beginPath();ctx.arc(pt.x-camX,pt.y,pt.r,0,7);ctx.fill();});
  ctx.globalAlpha=1;
  popups.forEach(f=>{ctx.globalAlpha=Math.max(0,f.life);ctx.fillStyle=f.col;ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText(f.txt,f.x-camX,f.y);});
  ctx.globalAlpha=1;
  drawZuzu();
  // off-screen present indicator
  let tgt=null;for(const pr of level.presents){if(!pr.opened){tgt=pr;break;}}
  if(tgt&&tgt.spawned){const sx=tgt.x-camX;if(sx>W-12){ctx.fillStyle='#ffd447';ctx.font='30px serif';ctx.textAlign='center';
    ctx.fillText('🎁',W-30,H*0.4);ctx.font='22px sans-serif';ctx.fillText('▶',W-30,H*0.4+26);}}
  if(appearFlash>0){ctx.globalAlpha=Math.min(1,appearFlash);ctx.fillStyle='#69f0ae';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
    ctx.fillText('🎁 מתנה הופיעה!',W/2,H*0.28);ctx.globalAlpha=1;}
  ctx.restore();
}

// ════════ HUD ════════
function updateHUD(){
  document.getElementById('hCoins').textContent='🪙 '+coinsCollected;
  document.getElementById('hSize').textContent=pSize?'🔵 גדול':`⚪ ${growth}/${GROW}`;
  document.getElementById('hPow').textContent='⚡ '+runPower;
  document.getElementById('hStars').textContent=`⭐ ${starsGot}/${totalStars}`;
  document.getElementById('hDist').textContent=Math.floor(player.x/8)+' מ׳';
  document.getElementById('mFill').style.width=momentum+'%';
  document.getElementById('spRefill').disabled=runPower<30;
  const zh=document.getElementById('zoneHint');
  if(state!=='play'){zh.textContent='';return;}
  const z=level.zones.find(z=>player.x>=z.x0&&player.x<z.x1);
  if(!z){zh.textContent='';return;}
  const pr=level.presents.find(pp=>pp.zone===z.id);
  if(pr&&pr.opened){zh.textContent='➡️ המשך!';zh.style.color='#bfe3ff';}
  else if(pr&&pr.spawned){zh.textContent='🎁 מתנה הופיעה — פתח אותה!';zh.style.color='#69f0ae';}
  else{zh.textContent=`🪙 אסוף מטבעות: ${zoneReqGot[z.id]||0}/${zoneReqTotal[z.id]||0}`;zh.style.color='#ffd447';}
}

// ════════ LOOP ════════
let last=performance.now(),acc=0;const STEP=1000/60;
function frame(now){acc+=Math.min(now-last,250);last=now;
  if(state==='play'){while(acc>=STEP){update(STEP/1000);acc-=STEP;if(state!=='play')break;}updateHUD();}else acc=0;
  if(level)render();requestAnimationFrame(frame);}

// ════════ INIT ════════
resize();level=LEVELS[0];GROUND_Y=H-130;player.y=GROUND_Y;
const pw=save.perWorld[1];if(pw&&pw.bestPower>0)document.getElementById('bestLine').textContent=`שיא קודם: ⚡ ${pw.bestPower} · 🪙 ${pw.bestCoins||0}`;
requestAnimationFrame(frame);
</script>
